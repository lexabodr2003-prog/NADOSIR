<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Фон — белый круг с красной обводкой, фирменный стиль KAMTEK -->
  <rect width="100" height="100" rx="16" fill="#fff"/>
  <!-- Красный стилизованный K-знак Камтек -->
  <!-- Вертикальная часть K -->
  <rect x="18" y="12" width="14" height="76" rx="3" fill="#CC0000"/>
  <!-- Верхняя диагональ K -->
  <polygon points="32,50 70,12 82,12 82,20 44,55 82,20 82,12" fill="#1a1a1a"/>
  <polygon points="32,50 72,12 84,12 44,55" fill="#1a1a1a"/>
  <!-- Нижняя диагональ K -->
  <polygon points="32,50 84,88 84,78 44,50" fill="#1a1a1a"/>
  <!-- Красная шеврон-часть (фирменный элемент) -->
  <polygon points="44,44 72,14 84,14 56,44" fill="#CC0000"/>
  <polygon points="44,56 72,86 84,86 56,56" fill="#CC0000"/>
</svg>
